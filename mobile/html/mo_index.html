<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판 뽑기</title>
    <style>
      :root {
        --line: rgba(185, 205, 255, 0.24);
        --line-weak: rgba(185, 205, 255, 0.12);
        --text: #e7efff;
        --muted: #9fb3d9;
        --bg-0: #070f1f;
        --bg-1: #0c1830;
        --bg-2: #132748;
        --red-0: #b72d3d;
        --red-1: #901f2c;
        --gray-0: #59637a;
        --gray-1: #3a4457;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 800px;
        height: 100vh;
        overflow: hidden;
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 0%, #1a2f58, transparent 42%),
          radial-gradient(circle at 100% 100%, #111b31, transparent 45%),
          var(--bg-0);
      }

      .page {
        width: 100%;
        height: 100vh;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .wrap {
        position: relative;
        width: 1100px;
        min-width: 800px;
        max-width: 1200px;
        max-height: 95vh;
        height: 100%;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(8, 14, 29, 0.95), rgba(8, 14, 29, 0.88));
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow: hidden;
      }

      .resize-handle {
        position: absolute;
        right: -9px;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 140px;
        border-radius: 999px;
        border: 1px solid rgba(173, 206, 255, 0.75);
        background: linear-gradient(180deg, rgba(188, 219, 255, 0.95), rgba(113, 158, 236, 0.95));
        box-shadow: 0 0 0 3px rgba(7, 15, 31, 0.85), 0 8px 20px rgba(0, 0, 0, 0.35);
        cursor: ew-resize;
        touch-action: none;
      }

      .topbar {
        border: 1px solid var(--line-weak);
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(14, 28, 53, 0.9), rgba(10, 20, 40, 0.9));
        padding: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .title {
        margin: 0;
        font-size: 28px;
        font-weight: 800;
      }

      .controls {
        display: flex;
        gap: 8px;
      }

      .btn {
        height: 36px;
        padding: 0 14px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #1a2947;
        color: var(--text);
        font-size: 14px;
      }

      .btn.btn-danger {
        background: #bf3541;
        border-color: #e06e77;
      }

      .layout {
        min-height: 0;
        flex: 1;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 12px;
      }

      .left-panel,
      .side-panel {
        min-height: 0;
        padding: 12px;
        border: 1px solid var(--line-weak);
        border-radius: 12px;
        background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
      }

      .left-panel {
        overflow-y: auto;
      }

      .left-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        font-size: 14px;
      }

      .left-head strong {
        margin-left: 6px;
        color: #ffca69;
      }

      .rank-banner {
        margin-bottom: 10px;
        padding: 9px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 214, 130, 0.34);
        background: linear-gradient(180deg, rgba(104, 79, 25, 0.38), rgba(58, 46, 17, 0.38));
        color: #ffc861;
        font-size: 15px;
        font-weight: 800;
      }

      .board-frame {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: linear-gradient(180deg, rgba(8, 16, 33, 0.74), rgba(17, 28, 52, 0.74));
      }

      .col-index,
      .board-row {
        display: grid;
        grid-template-columns: 34px repeat(10, minmax(0, 1fr));
        gap: 6px;
      }

      .col-index {
        margin-bottom: 6px;
      }

      .col-index span,
      .row-label {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
      }

      .rows {
        display: grid;
        gap: 6px;
      }

      .cube {
        aspect-ratio: 1 / 1;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: linear-gradient(145deg, var(--red-0), var(--red-1));
        color: #fff;
        font-size: 12px;
        font-weight: 800;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }

      .cube.opened {
        background: linear-gradient(145deg, var(--gray-0), var(--gray-1));
        color: #eef2ff;
        font-size: 13px;
        cursor: default;
      }

      .side-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: linear-gradient(180deg, rgba(6, 18, 42, 0.9), rgba(8, 22, 50, 0.84));
        padding: 10px;
        min-height: 300px;
        max-height: 500px;
        display: flex;
        flex-direction: column;
      }

      .card h3 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1;
      }

      .list {
        margin: 0;
        padding: 0;
        list-style: none;
        min-height: 0;
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      .history-item {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px;
        min-height: 40px;
        background: rgba(255, 255, 255, 0.03);
        display: grid;
        grid-template-columns: 1fr 44px 66px;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.1px;
      }

      .product-item {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 7px;
        background: rgba(255, 255, 255, 0.03);
        display: grid;
        grid-template-columns: 44px 1fr;
        align-items: center;
        gap: 8px;
      }

      .product-thumb {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.22);
      }

      .product-meta {
        display: grid;
        gap: 4px;
      }

      .product-name {
        font-size: 12px;
        font-weight: 700;
        line-height: 1.35;
        word-break: keep-all;
        letter-spacing: 0.1px;
      }

      .left-panel,
      .side-panel,
      .list {
        scrollbar-width: thin;
        scrollbar-color: rgba(150, 186, 255, 0.78) rgba(11, 23, 48, 0.58);
      }

      .left-panel::-webkit-scrollbar,
      .side-panel::-webkit-scrollbar,
      .list::-webkit-scrollbar {
        width: 9px;
      }

      .left-panel::-webkit-scrollbar-track,
      .side-panel::-webkit-scrollbar-track,
      .list::-webkit-scrollbar-track {
        background: rgba(11, 23, 48, 0.58);
        border-radius: 999px;
      }

      .left-panel::-webkit-scrollbar-thumb,
      .side-panel::-webkit-scrollbar-thumb,
      .list::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, rgba(173, 206, 255, 0.92), rgba(104, 151, 232, 0.92));
        border-radius: 999px;
        border: 2px solid rgba(11, 23, 48, 0.55);
      }

      .reveal-modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        z-index: 50;
      }

      .reveal-modal[hidden] {
        display: none;
      }

      .reveal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(4, 9, 20, 0.56);
        backdrop-filter: blur(6px);
      }

      .reveal-dialog {
        position: relative;
        z-index: 1;
        width: min(94%, 440px);
        padding: 18px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(14, 28, 53, 0.95), rgba(10, 20, 40, 0.95));
      }

      .reveal-close {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 32px;
        height: 32px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #142648;
        color: #fff;
      }

      .reveal-title {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 700;
      }

      .reveal-card {
        position: relative;
        height: 160px;
        border-radius: 12px;
        overflow: hidden;
      }

      .reveal-base {
        height: 100%;
        border-radius: 12px;
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #2a3852, #1a2437);
      }

      .reveal-num {
        font-size: 44px;
        font-weight: 900;
      }

      .reveal-cover {
        position: absolute;
        inset: 0;
        background: linear-gradient(145deg, rgba(89, 99, 122, 0.96), rgba(58, 68, 87, 0.96));
        border: 1px solid var(--line);
        border-radius: 12px;
        touch-action: none;
        cursor: ew-resize;
        will-change: transform;
      }

      .reveal-progress {
        margin-top: 10px;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.1);
      }

      .reveal-bar {
        width: 0;
        height: 100%;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.75);
      }

      .win-modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        z-index: 60;
      }

      .win-modal[hidden] {
        display: none;
      }

      .win-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(3, 8, 18, 0.62);
        backdrop-filter: blur(6px);
      }

      .win-dialog {
        position: relative;
        z-index: 1;
        width: min(94%, 420px);
        border: 1px solid rgba(255, 208, 124, 0.45);
        border-radius: 14px;
        padding: 18px 18px 16px;
        background: linear-gradient(180deg, rgba(47, 33, 13, 0.95), rgba(29, 20, 8, 0.95));
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.45);
      }

      .win-close {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 32px;
        height: 32px;
        border-radius: 999px;
        border: 1px solid rgba(255, 214, 130, 0.36);
        background: rgba(45, 33, 17, 0.9);
        color: #ffe5af;
      }

      .win-title {
        margin: 0;
        font-size: 28px;
        font-weight: 900;
        line-height: 1.1;
        color: #ffcf71;
        letter-spacing: 0.3px;
      }

      .win-subtitle {
        margin: 8px 0 0;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.4;
        color: #ffe8bf;
        word-break: keep-all;
      }
    </style>
  </head>

    <script>
      (function () {
        var cubes = Array.prototype.slice.call(document.querySelectorAll(".board-row .cube"));
        var totalEl = document.getElementById("totalCount");
        var remainEl = document.getElementById("remainCount");
        var historyList = document.getElementById("historyList");
        var rankText = document.getElementById("highRankText");
        var modal = document.getElementById("revealModal");
        var closeBtn = document.getElementById("revealClose");
        var revealCard = document.getElementById("revealCard");
        var revealCover = document.getElementById("revealCover");
        var revealBar = document.getElementById("revealBar");
        var revealNum = document.getElementById("revealNum");
        var winModal = document.getElementById("winModal");
        var winClose = document.getElementById("winClose");
        var winSubtitle = document.getElementById("winSubtitle");
        var wrap = document.querySelector(".wrap");
        var resizeHandle = document.getElementById("resizeHandle");
        var currentId = null;
        var progress = 0;
        var prizeMap = {};

        cubes.forEach(function (cube, i) {
          cube.dataset.id = String(i + 1);
          if (cube.classList.contains("opened")) {
            cube.textContent = String(i + 1);
          }
        });

        Array.prototype.slice.call(document.querySelectorAll(".product-name")).forEach(function (el) {
          var text = el.textContent.trim();
          var noMatch = text.match(/(\d+)\s*번/);
          var headMatch = text.match(/^\s*(\d+)\s*\./);
          var cardNo = noMatch ? Number(noMatch[1]) : headMatch ? Number(headMatch[1]) : NaN;
          if (Number.isFinite(cardNo) && cardNo > 0) {
            prizeMap[cardNo] = text;
          }
        });

        function getOpenedCount() {
          return document.querySelectorAll(".board-row .cube.opened").length;
        }

        function updateRemain() {
          totalEl.textContent = String(cubes.length);
          remainEl.textContent = String(cubes.length - getOpenedCount());
        }

        function setProgress(v) {
          progress = Math.max(0, Math.min(1, v));
          var w = Math.max(1, revealCard.getBoundingClientRect().width);
          revealCover.style.transform = "translateX(" + (progress * w).toFixed(2) + "px)";
          revealBar.style.width = Math.round(progress * 100) + "%";
        }

        function closeModal() {
          modal.hidden = true;
          currentId = null;
          setProgress(0);
        }

        function showWinPopup(cardId) {
          var productTitle = prizeMap[cardId];
          if (!productTitle) return;
          winSubtitle.textContent = cardId + "번 - " + productTitle;
          winModal.hidden = false;
        }

        function closeWinPopup() {
          winModal.hidden = true;
          winSubtitle.textContent = "";
        }

        function addHistory(cardId) {
          var now = new Date();
          var hh = String(now.getHours()).padStart(2, "0");
          var mm = String(now.getMinutes()).padStart(2, "0");
          var ss = String(now.getSeconds()).padStart(2, "0");
          var li = document.createElement("li");
          li.className = "history-item";
          li.innerHTML = "<span>랜덤뽑기</span><span>" + cardId + "번</span><span>" + hh + ":" + mm + ":" + ss + "</span>";
          historyList.insertBefore(li, historyList.firstChild);
        }

        function updateRankText(cardId) {
          var arr = rankText.textContent.split(",").map(function (s) { return s.trim(); }).filter(Boolean);
          arr = arr.filter(function (v) { return v !== String(cardId); });
          rankText.textContent = arr.length ? arr.join(", ") : "없음";
        }

        function confirmOpen(cardId) {
          var target = cubes[cardId - 1];
          if (!target || target.classList.contains("opened")) return;
          target.classList.add("opened");
          target.textContent = String(cardId);
          addHistory(cardId);
          updateRankText(cardId);
          updateRemain();
          if (prizeMap[cardId]) {
            setTimeout(function () {
              showWinPopup(cardId);
            }, 170);
          }
        }

        cubes.forEach(function (cube) {
          cube.addEventListener("click", function () {
            if (cube.classList.contains("opened")) return;
            currentId = Number(cube.dataset.id);
            revealNum.textContent = String(currentId);
            modal.hidden = false;
            setProgress(0);
          });
        });

        var dragging = false;
        var pointerId = null;
        var startX = 0;
        var startP = 0;
        var baseW = 1;

        revealCover.addEventListener("pointerdown", function (e) {
          if (currentId == null) return;
          if (e.pointerType === "mouse" && e.button !== 0) return;
          dragging = true;
          pointerId = e.pointerId;
          startX = e.clientX;
          startP = progress;
          baseW = Math.max(1, revealCard.getBoundingClientRect().width);
          revealCover.setPointerCapture(e.pointerId);
          e.preventDefault();
        });

        revealCover.addEventListener("pointermove", function (e) {
          if (!dragging || e.pointerId !== pointerId) return;
          setProgress(startP + (e.clientX - startX) / baseW);
        });

        function endDrag(e) {
          if (!dragging || e.pointerId !== pointerId) return;
          dragging = false;
          pointerId = null;
          if (progress >= 0.985) {
            setProgress(1);
            confirmOpen(currentId);
            setTimeout(closeModal, 160);
          } else {
            setProgress(0);
          }
        }

        revealCover.addEventListener("pointerup", endDrag);
        revealCover.addEventListener("pointercancel", endDrag);

        modal.addEventListener("click", function (e) {
          if (e.target && e.target.getAttribute("data-close") === "1") closeModal();
        });
        closeBtn.addEventListener("click", closeModal);
        winModal.addEventListener("click", function (e) {
          if (e.target && e.target.getAttribute("data-win-close") === "1") closeWinPopup();
        });
        winClose.addEventListener("click", closeWinPopup);

        if (wrap && resizeHandle) {
          var resizing = false;
          var resizePointerId = null;
          var startClientX = 0;
          var startWidth = 0;
          var minW = 800;
          var maxW = 1200;

          function clampWidth(v) {
            return Math.max(minW, Math.min(maxW, v));
          }

          resizeHandle.addEventListener("pointerdown", function (e) {
            if (e.pointerType === "mouse" && e.button !== 0) return;
            resizing = true;
            resizePointerId = e.pointerId;
            startClientX = e.clientX;
            startWidth = wrap.getBoundingClientRect().width;
            resizeHandle.setPointerCapture(e.pointerId);
            e.preventDefault();
          });

          resizeHandle.addEventListener("pointermove", function (e) {
            if (!resizing || e.pointerId !== resizePointerId) return;
            var next = clampWidth(startWidth + (e.clientX - startClientX));
            wrap.style.width = next + "px";
          });

          function stopResize(e) {
            if (!resizing || e.pointerId !== resizePointerId) return;
            resizing = false;
            resizePointerId = null;
          }

          resizeHandle.addEventListener("pointerup", stopResize);
          resizeHandle.addEventListener("pointercancel", stopResize);
        }
        updateRemain();
      })();
    </script>
  </body>
</html>
