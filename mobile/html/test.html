<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세로-가로-세로 스크롤</title>
  <style>
    :root {
      --container: 1000px;
      --gap: 20px;
      --bg: #f5f7fb;
      --line: #d9e1ef;
      --txt: #1e2430;
      --muted: #5f6b7e;
      --panel-w: min(78vw, 520px);
      --panel-h: clamp(280px, 50vw, 560px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--txt);
      font-family: "Noto Sans KR", "Pretendard", sans-serif;
    }

    .container {
      width: min(var(--container), calc(100% - 32px));
      margin: 0 auto;
    }

    section {
      padding: clamp(56px, 8vw, 110px) 0;
    }

    .box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: clamp(20px, 4vw, 40px);
    }

    h1, h2 {
      margin: 0 0 12px;
      font-size: clamp(26px, 4.2vw, 44px);
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.7;
    }

    .row_scrol {
      position: relative;
      margin: 20px 0;
      padding: 0;
    }

    .row_scrol .pin {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fbfcff, #eef2fa);
    }

    .row_scrol .track {
      display: flex;
      gap: var(--gap);
      padding: 0 max(16px, calc((100vw - var(--container)) / 2));
      will-change: transform;
    }

    .panel {
      flex: 0 0 auto;
      width: var(--panel-w);
      height: var(--panel-h);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
      position: relative;
      background: #ddd;
    }

    .panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge {
      position: absolute;
      left: 14px;
      bottom: 14px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      color: #fff;
      background: rgba(0, 0, 0, 0.52);
    }

    @media (max-width: 768px) {
      .container { width: calc(100% - 24px); }
      .row_scrol .track { padding-inline: 12px; }
    }
  </style>
</head>
<body>
  <section>
    <div class="container">
      <div class="box">
        <h1>세로 스크롤 시작</h1>
        <p>아래로 내리면 중간 .row_scrol 구간에서 세로 스크롤이 가로 이동으로 변환됩니다.</p>
      </div>
    </div>
  </section>

  <section class="row_scrol" id="rowScrol">
    <div class="pin">
      <div class="track" id="hTrack">
        <article class="panel"><img src="https://picsum.photos/id/1015/1200/900" alt="1" /><span class="badge">01</span></article>
        <article class="panel"><img src="https://picsum.photos/id/1016/1200/900" alt="2" /><span class="badge">02</span></article>
        <article class="panel"><img src="https://picsum.photos/id/1025/1200/900" alt="3" /><span class="badge">03</span></article>
        <article class="panel"><img src="https://picsum.photos/id/1035/1200/900" alt="4" /><span class="badge">04</span></article>
        <article class="panel"><img src="https://picsum.photos/id/1042/1200/900" alt="5" /><span class="badge">05</span></article>
      </div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="box">
        <h2>다시 세로 스크롤</h2>
        <p>가로 구간이 끝나면 다시 아래로 자연스럽게 내려갑니다. 이미지로 교체해서 그대로 사용하면 됩니다.</p>
      </div>
    </div>
  </section>

  <script>
    (function () {
      var section = document.getElementById("rowScrol");
      var track = document.getElementById("hTrack");
      if (!section || !track) return;

      var maxX = 0;

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function measure() {
        maxX = Math.max(0, track.scrollWidth - window.innerWidth);
        section.style.height = (window.innerHeight + maxX) + "px";
        render();
      }

      function render() {
        var start = section.offsetTop;
        var y = window.scrollY - start;
        var x = clamp(y, 0, maxX);
        track.style.transform = "translate3d(" + (-x) + "px, 0, 0)";
      }

      window.addEventListener("scroll", render, { passive: true });
      window.addEventListener("resize", measure);
      window.addEventListener("load", measure);
      measure();
    })();
  </script>
</body>
</html>
